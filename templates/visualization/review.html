{% extends "base.html" %}
{% block title %}评论情感洞察{% endblock %}
{% block content %}
<h2 class="page-title mb-1">评论情感洞察</h2>
<p class="page-subtitle">情感极性、评分分布、主题关注</p>
<div id="loadError" class="alert alert-warning d-none" role="alert">
  数据加载失败：请先确认接口 <code>/api/review/sentiment/</code> 能在浏览器中打开，且数据库已存在评论数据。
</div>
<div class="row mb-4">
  <div class="col-md-4 mb-3">
    <div class="card stat-card">
      <div class="card-body">
        <h6 class="text-muted mb-1">评论总数</h6>
        <h3 class="mb-0" id="totalReviews">—</h3>
      </div>
    </div>
  </div>
</div>
<div class="row">
  <div class="col-lg-4 mb-4">
    <div class="card">
      <div class="card-header">情感极性分布</div>
      <div class="card-body">
        <div id="chartSentiment" class="chart-container"></div>
      </div>
    </div>
  </div>
  <div class="col-lg-4 mb-4">
    <div class="card">
      <div class="card-header">评分分布（1-5 星）</div>
      <div class="card-body">
        <div id="chartRating" class="chart-container"></div>
      </div>
    </div>
  </div>
  <div class="col-lg-4 mb-4">
    <div class="card">
      <div class="card-header">主题关注分布</div>
      <div class="card-body">
        <div id="chartTopics" class="chart-container"></div>
      </div>
    </div>
  </div>
  <div class="col-12 mb-4">
    <div class="card">
      <div class="card-header">评分与情感对比（柱状 + 折线）</div>
      <div class="card-body">
        <div id="chartRatingLine" class="chart-container-sm"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
(function() {
  var colors = ['#10b981','#94a3b8','#ef4444'];
  Dash.fetchJson('/api/review/sentiment/').then(function(res) {
    var d = res.data || {};
    document.getElementById('totalReviews').textContent = d.total_reviews != null ? d.total_reviews.toLocaleString() : '—';

    var sent = d.sentiment_dist || [];
    if (sent.length) {
      var ch = Dash.initChart('chartSentiment');
      ch.setOption({
        color: colors,
        tooltip: { trigger: 'item', formatter: '{b}: {c} 条 ({d}%)' },
        series: [{ type: 'pie', radius: ['40%', '70%'], center: ['50%', '50%'],
          data: sent.map(function(x) { return { name: x.name, value: x.value }; }),
          label: { formatter: '{b}\n{c}' }, emphasis: { itemStyle: { shadowBlur: 12 } }
        }]
      });
    }
    var rating = d.rating_dist || [];
    if (rating.length) {
      var ch2 = Dash.initChart('chartRating');
      ch2.setOption({
        color: ['#f59e0b'],
        tooltip: { trigger: 'axis' },
        grid: { left: '14%', right: '10%', top: '10%', bottom: '14%' },
        xAxis: { type: 'category', data: rating.map(function(x) { return x.rating + ' 星'; }) },
        yAxis: { type: 'value', name: '条数' },
        series: [{ type: 'bar', data: rating.map(function(x) { return x.count; }), barWidth: '50%',
          itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: '#f59e0b' }, { offset: 1, color: '#fbbf24' }] } }
        }]
      });
    }
    var topics = d.topics || [];
    if (topics.length) {
      var ch3 = Dash.initChart('chartTopics');
      ch3.setOption({
        color: window.CHART_COLORS || ['#0ea5e9'],
        tooltip: { trigger: 'item', formatter: '{b}: {c} 条' },
        series: [{ type: 'pie', radius: '65%', roseType: 'area',
          data: topics.map(function(x) { return { name: x.name, value: x.value }; }),
          label: { formatter: '{b}\n{c}' }
        }]
      });
    }
    if (rating.length) {
      var ch4 = Dash.initChart('chartRatingLine');
      ch4.setOption({
        color: ['#f59e0b', '#8b5cf6'],
        tooltip: { trigger: 'axis' },
        legend: { data: ['评论数', '占比'], top: 0 },
        grid: { left: '12%', right: '10%', top: '18%', bottom: '14%' },
        xAxis: { type: 'category', data: rating.map(function(x) { return x.rating + '星'; }) },
        yAxis: [{ type: 'value', name: '评论数' }, { type: 'value', name: '占比%', axisLabel: { formatter: '{value}%' }, max: 100 }],
        series: [
          { name: '评论数', type: 'bar', data: rating.map(function(x) { return x.count; }), barWidth: '35%' },
          { name: '占比', type: 'line', yAxisIndex: 1, data: (function() { var t = rating.reduce(function(s, x) { return s + x.count; }, 0); return rating.map(function(x) { return t ? Math.round(x.count/t*100) : 0; }); })(), symbol: 'circle', symbolSize: 8 }
        ]
      });
    }
    Dash.resizeAll();
  }).catch(function() {
    var el = document.getElementById('loadError');
    if (el) el.classList.remove('d-none');
  });
})();
</script>
{% endblock %}
